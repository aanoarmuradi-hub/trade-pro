{% extends 'base.html' %}

{% block content %}

<div class="top-actions">

    <h1>Trades</h1>

    <a href="/add/" class="add-btn">
        + Add Trade
    </a>

</div>

<div class="card">

<table class="trade-table">

    <tr>
        <th>Symbol</th>
        <th>Type</th>
        <th>Lot</th>
        <th>Profit/Loss</th>
    </tr>

    {% for trade in trades %}

<tr>
    <td>{{ trade.symbol }}</td>
    <td>{{ trade.trade_type }}</td>
    <td>{{ trade.lot_size }}</td>
    <td>${{ trade.profit_loss|floatformat:2 }}</td>

    <td>
        <a href="{% url 'edit_trade' trade.id %}" class="btn-edit">
            Edit
        </a>

        <a href="{% url 'delete_trade' trade.id %}" class="btn-delete">
            Delete
        </a>
    </td>
</tr>

    {% endfor %}

</table>

</div>

{% endblock %}
