{% extends 'base.html' %}

{% block content %}

<div style="margin-top: 20px;" class="profile-page">

    <div class="card">

        <h2>👤 My Profile</h2>
        
        <form method="POST">
            
            {% csrf_token %}
            
            {{ form.as_p }}
            
            
            <button
                type="submit"
                class="btn-save"
            >
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
